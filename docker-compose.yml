version: "3.9"

# ── ModelHub — Full Production Stack ─────────────────────────────────────────
# Services:
#   gateway          — nginx (port 80) — weighted A/B routing + rate limiting
#   serving-champion — FastAPI (port 8000) — champion model, CHAMPION_PCT=100
#   serving-challenger — FastAPI (port 8001) — challenger, CHAMPION_PCT=0
#   mlflow-server    — MLflow tracking server (port 5001)
#   postgres         — PostgreSQL — predictions audit + model registry
#   prometheus       — Prometheus (port 9090)
#   grafana          — Grafana (port 3000)
# ─────────────────────────────────────────────────────────────────────────────

networks:
  backend:
    driver: bridge

volumes:
  postgres_data:
  mlruns_data:
  prometheus_data:
  grafana_data:

# ── Shared serving configuration ──────────────────────────────────────────────
x-serving-base: &serving-base
  build:
    context: .
    dockerfile: serving/Dockerfile
  restart: unless-stopped
  networks:
    - backend
  depends_on:
    postgres:
      condition: service_healthy
  environment:
    # Use local SQLite directly — avoids MLflow 3.x Host-header security rejection
    MLFLOW_TRACKING_URI: sqlite:////app/mlruns.db
    MODEL_NAME: ${MODEL_NAME:-ecommerce-churn-predictor}
    POSTGRES_DSN: ${POSTGRES_DSN:-postgresql://modelhub:modelhub@postgres:5432/modelhub}
  volumes:
    - ./mlruns.db:/app/mlruns.db:ro   # trained models from local mlruns.db

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - backend
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-modelhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-modelhub}
      POSTGRES_DB: ${POSTGRES_DB:-modelhub}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-modelhub} -d ${POSTGRES_DB:-modelhub}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MLflow Server ────────────────────────────────────────────────────────────
  mlflow-server:
    build:
      context: .
      dockerfile: mlflow-server/Dockerfile
    restart: unless-stopped
    networks:
      - backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      BACKEND_STORE_URI: ${MLFLOW_BACKEND_STORE_URI:-postgresql://modelhub:modelhub@postgres:5432/modelhub}
      DEFAULT_ARTIFACT_ROOT: ${MLFLOW_ARTIFACT_ROOT:-/mlruns}
    volumes:
      - mlruns_data:/mlruns
    ports:
      - "${MLFLOW_PORT:-5001}:5001"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:5001/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Champion serving (100 % champion traffic when called directly) ───────────
  serving-champion:
    <<: *serving-base
    container_name: serving-champion
    environment:
      MLFLOW_TRACKING_URI: sqlite:////app/mlruns.db
      MODEL_NAME: ${MODEL_NAME:-ecommerce-churn-predictor}
      POSTGRES_DSN: ${POSTGRES_DSN:-postgresql://modelhub:modelhub@postgres:5432/modelhub}
      CHAMPION_PCT: "100"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── Challenger serving (0 % champion = 100 % challenger) ────────────────────
  serving-challenger:
    <<: *serving-base
    container_name: serving-challenger
    environment:
      MLFLOW_TRACKING_URI: sqlite:////app/mlruns.db
      MODEL_NAME: ${MODEL_NAME:-ecommerce-churn-predictor}
      POSTGRES_DSN: ${POSTGRES_DSN:-postgresql://modelhub:modelhub@postgres:5432/modelhub}
      CHAMPION_PCT: "0"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── Nginx API Gateway ────────────────────────────────────────────────────────
  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    restart: unless-stopped
    networks:
      - backend
    depends_on:
      serving-champion:
        condition: service_healthy
      serving-challenger:
        condition: service_healthy
    ports:
      - "${GATEWAY_PORT:-80}:80"

  # ── Prometheus ───────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    restart: unless-stopped
    networks:
      - backend
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"

  # ── Grafana ──────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.3
    restart: unless-stopped
    networks:
      - backend
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-modelhub}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/api_metrics.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
