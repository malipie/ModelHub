# ── ModelHub CI Pipeline ───────────────────────────────────────────────────
#
# Runs on every push to main and on every pull request.
#
# Jobs:
#   lint          — black --check + ruff on training/ and serving/
#   test-training — pytest training/tests/ with coverage
#   test-serving  — pytest serving/tests/ with coverage (uses FakeModel, no dataset)
#   docker-build  — docker compose build (image smoke-test, no containers started)
#
# What is intentionally NOT in this pipeline:
#   - make train      — requires the dataset (Data/raw/ecommerce_churn.csv, gitignored)
#   - make export-models — requires trained MLflow runs (mlruns.db, gitignored)
#   - make docker-up  — requires a full running stack; end-to-end tests belong
#                        in a separate integration workflow with a staging environment
#
# ─────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:

  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint (black + ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint deps
        run: pip install black==24.3.0 ruff==0.3.4

      - name: black --check (training)
        run: black --check --line-length=100 training/src/ training/tests/

      - name: black --check (serving)
        run: black --check --line-length=100 serving/src/ serving/tests/

      - name: ruff (training)
        run: ruff check training/src/ training/tests/

      - name: ruff (serving)
        run: ruff check serving/src/ serving/tests/

  # ── Training tests ────────────────────────────────────────────────────────
  test-training:
    name: Tests — training pipeline
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: training/requirements.txt

      - name: Install dependencies
        run: pip install -r training/requirements.txt

      - name: Run tests
        run: |
          pytest training/tests/ \
            -v \
            --cov=training/src \
            --cov-report=term-missing \
            --cov-report=xml:coverage-training.xml \
            --tb=short

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-training
          path: coverage-training.xml
          retention-days: 7

  # ── Serving tests ─────────────────────────────────────────────────────────
  test-serving:
    name: Tests — serving API
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: serving/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r training/requirements.txt
          pip install -r serving/requirements.txt

      - name: Run tests
        # MLFLOW_TRACKING_URI points to a temp SQLite so model_loader
        # falls through to the .pkl fallback path — which is also absent,
        # so conftest.py patches it with FakeModel. No real model needed.
        env:
          MLFLOW_TRACKING_URI: sqlite:///ci_mlruns.db
          MODEL_NAME: ecommerce-churn-predictor
        run: |
          pytest serving/tests/ \
            -v \
            --cov=serving/src \
            --cov-report=term-missing \
            --cov-report=xml:coverage-serving.xml \
            --tb=short

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-serving
          path: coverage-serving.xml
          retention-days: 7

  # ── Docker build ──────────────────────────────────────────────────────────
  docker-build:
    name: Docker build smoke-test
    runs-on: ubuntu-latest
    needs: [test-training, test-serving]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # serving/ needs at least a placeholder .pkl so the COPY in Dockerfile
      # doesn't fail — the file is gitignored so we create an empty stand-in.
      - name: Create placeholder model files
        run: |
          mkdir -p serving/models
          touch serving/models/champion.pkl
          touch serving/models/challenger.pkl

      - name: Build all images
        run: docker compose build --no-cache

      - name: Verify images exist
        run: docker images --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}"
