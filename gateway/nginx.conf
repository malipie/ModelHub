# ── nginx API Gateway ─────────────────────────────────────────────────────────
# Weighted upstream routing: 80 % → serving-champion, 20 % → serving-challenger
# Rate limiting: 100 req/s per IP
# Access log: JSON format
# ─────────────────────────────────────────────────────────────────────────────

# Shared memory zone for rate limiting (10 MB ~ 160 000 IPs)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=1000r/s;

# JSON access log format
log_format json_combined escape=json
    '{'
        '"timestamp":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"bytes_sent":$bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_addr":"$upstream_addr",'
        '"upstream_response_time":"$upstream_response_time",'
        '"http_x_request_id":"$http_x_request_id"'
    '}';

# ── Upstream pools ────────────────────────────────────────────────────────────

upstream serving_champion {
    server serving-champion:8000;
    keepalive 32;
}

upstream serving_challenger {
    server serving-challenger:8000;
    keepalive 32;
}

# Weighted pool: 4:1 → ~80 % champion, ~20 % challenger
upstream serving_ab {
    server serving-champion:8000 weight=4;
    server serving-challenger:8000 weight=1;
    keepalive 32;
}

# ── Server block ──────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;

    access_log /var/log/nginx/access.log json_combined;
    error_log  /var/log/nginx/error.log warn;

    # ── CORS headers (added to every response) ──
    add_header Access-Control-Allow-Origin  "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, X-Request-Id" always;

    # ── Pass-through / generate Request-ID ──
    set $req_id $http_x_request_id;
    if ($req_id = "") {
        set $req_id $request_id;   # nginx built-in UUID (nginx ≥ 1.11.0)
    }
    add_header X-Request-Id $req_id always;

    # ── OPTIONS preflight ──
    if ($request_method = OPTIONS) {
        return 204;
    }

    # ── A/B routed predict endpoint ──
    location = /predict {
        limit_req zone=api_limit burst=500 nodelay;

        proxy_pass         http://serving_ab;
        proxy_http_version 1.1;
        proxy_set_header   Connection      "";
        proxy_set_header   Host            $host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Request-Id    $req_id;
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;
    }

    # ── Champion-only endpoint ──
    location = /predict/champion {
        limit_req zone=api_limit burst=500 nodelay;

        proxy_pass         http://serving_champion;
        proxy_http_version 1.1;
        proxy_set_header   Connection   "";
        proxy_set_header   Host         $host;
        proxy_set_header   X-Real-IP    $remote_addr;
        proxy_set_header   X-Request-Id $req_id;
        proxy_read_timeout 30s;
    }

    # ── Challenger-only endpoint ──
    location = /predict/challenger {
        limit_req zone=api_limit burst=500 nodelay;

        proxy_pass         http://serving_challenger;
        proxy_http_version 1.1;
        proxy_set_header   Connection   "";
        proxy_set_header   Host         $host;
        proxy_set_header   X-Real-IP    $remote_addr;
        proxy_set_header   X-Request-Id $req_id;
        proxy_read_timeout 30s;
    }

    # ── Admin / ops endpoints — route to champion ──
    location ~ ^/(health|model|ab|metrics)(/.*)?$ {
        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass         http://serving_champion;
        proxy_http_version 1.1;
        proxy_set_header   Connection   "";
        proxy_set_header   Host         $host;
        proxy_set_header   X-Real-IP    $remote_addr;
        proxy_set_header   X-Request-Id $req_id;
    }

    # ── Swagger docs (champion) ──
    location /docs {
        proxy_pass         http://serving_champion;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host       $host;
    }

    location /openapi.json {
        proxy_pass         http://serving_champion;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host       $host;
    }

    # ── 404 catch-all ──
    location / {
        return 404 '{"detail":"Not Found"}';
        add_header Content-Type application/json always;
    }
}
